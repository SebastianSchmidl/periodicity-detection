name: Test Pull Request

on:
  pull_request:
    branches:
      - main

# Required shell entrypoint to have properly activated conda environments
defaults:
  run:
    shell: bash -l {0}

jobs:
  check:
    name: Run checks for periodicity-detection on ubuntu with python 3.9
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3.3.0
        with:
          use-mamba: true
          auto-update-conda: true
          python-version: "3.10"
          channels: "defaults"
      - name: Install dependencies
        run: |
          pip install ".[dev]"
      - name: Typcheck with mypy
        run: |
          mypy periodicity_detection tests
      - name: Lint with flake8
        run: |
          flake8 . --count --show-source --statistics

  test:
    name: Test periodicity-detection on ${{ matrix.os }} with python ${{ matrix.python_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 3
      matrix:
        os: [ubuntu-latest] # [ubuntu-latest, windows-latest, macOS-latest]
        python_version: ["3.10", "3.14"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3.3.0
      with:
        use-mamba: true
        auto-update-conda: true
        python-version: ${{ matrix.python_version }}
        channels: "defaults"
    - name: Install dependencies
      run: |
        pip install ".[dev]"
    - name: Test with pytest
      run: |
        pytest --cov-report=term --cov-report=xml:coverage.xml --cov=periodicity_detection tests
    - name: Upload Coverage to Codecov
      if: ${{ matrix.os == 'ubuntu-latest' }}
      uses: codecov/codecov-action@v6
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: coverage.xml
        flags: unittests
